server:
  port: 8081

spring:
  application:
    name: auth-service
  profiles:
    active: dev
  # The MongoDB connection URI is defined per-profile (see application-dev.yml / application-prod.yml)
  # so tests can substitute an embedded MongoDB without an explicit URI conflicting.
  data:
    mongodb:
      # Create the @Indexed(unique=true) indexes declared on the entities at startup.
      auto-index-creation: true

# JWT signing + lifetimes. The secret MUST be at least 32 bytes (256 bits) for HS256.
# In real environments this is supplied via the JWT_SECRET environment variable.
security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-prod-this-is-a-256-bit-development-secret-key-0123456789}
    issuer: auth-service
    access-token-expiration-ms: 900000        # 15 minutes
    refresh-token-expiration-ms: 604800000     # 7 days

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      type: b3
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}

info:
  app:
    name: Auth Service
    version: 1.0.0
    description: Authentication and JWT issuing for the Banking microservices system

springdoc:
  api-docs:
    path: /api/auth/v3/api-docs
  swagger-ui:
    path: /api/auth/swagger-ui.html
